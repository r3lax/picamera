name: Socket Fix autopilot

# Opens Socket dependency-fix PRs and enables GitHub auto-merge on those PRs.
# Repo checks still decide whether a generated fix can merge.
on:
  schedule:
    - cron: "10 6 * * *"
    - cron: "10 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: socket-fix-autopilot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  socket-fix:
    name: Open Socket fix PRs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOCKET_CLI_VERSION: "1.1.93"
      SOCKET_CLI_ORG_SLUG: "atlas-private-holdings"
      SOCKET_CLI_API_TOKEN: ${{ secrets.SOCKET_CLI_API_TOKEN || secrets.SOCKET_SECURITY_API_TOKEN || secrets.SOCKET_SECURITY_API_KEY }}
      SOCKET_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SOCKET_CLI_GIT_USER_NAME: socket-fix[bot]
      SOCKET_CLI_GIT_USER_EMAIL: socket-fix[bot]@users.noreply.github.com
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Verify Socket token
        run: |
          if [ -z "${SOCKET_CLI_API_TOKEN:-}" ]; then
            echo "::error title=Socket token missing::Set SOCKET_CLI_API_TOKEN, SOCKET_SECURITY_API_TOKEN, or SOCKET_SECURITY_API_KEY as an org/repo Actions secret."
            exit 1
          fi

      - name: Open auto-merge PRs for fixable dependency findings
        run: >
          npm exec --yes --package "socket@${SOCKET_CLI_VERSION}" -- socket fix
          --autopilot
          --minimum-release-age 1w
          --no-major-updates
          --range-style preserve
          --pr-limit 3
